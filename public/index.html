<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Architect</title>
  <style>
    :root{
      --bg:#0d1117; --panel:#161d28; --panel2:#1d2635; --border:#2b3647;
      --text:#e6edf3; --muted:#94a3b8; --accent:#4ea1ff; --ok:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:1000px;margin:0 auto;padding:32px 20px}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0 0 20px;color:var(--muted);line-height:1.5}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
    .row{display:grid;grid-template-columns:1fr 220px;gap:14px;margin-bottom:14px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{
      width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:10px;padding:12px 14px;outline:none
    }
    textarea{min-height:280px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    .actions{display:flex;gap:10px;margin-top:12px}
    button{
      border:0;border-radius:10px;padding:12px 16px;cursor:pointer;font-weight:700
    }
    .primary{background:var(--accent);color:#04111f}
    .secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
    .result{margin-top:18px}
    .hidden{display:none}
    .summary{font-size:15px;line-height:1.6;color:var(--text)}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-right:8px}
    .good{background:rgba(34,197,94,.15);color:#86efac}
    .fair{background:rgba(245,158,11,.15);color:#fcd34d}
    .bad{background:rgba(239,68,68,.15);color:#fca5a5}
    .issues{display:grid;gap:10px;margin-top:14px}
    .issue{background:var(--panel2);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:10px;padding:12px}
    .issue h3{margin:0 0 6px;font-size:16px}
    .issue p{margin:0;color:var(--text)}
    .muted{color:var(--muted)}
    pre{white-space:pre-wrap;background:#0b1220;border:1px solid var(--border);padding:12px;border-radius:10px;overflow:auto}
    @media (max-width: 720px){ .row{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="app">
    <h1>Digital Architect</h1>
    <p>Paste your code, run a review, and see the analysis.</p>

    <div class="card">
      <div class="row">
        <input id="reviewName" placeholder="Review name (optional)" />
        <select id="language">
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="python">Python</option>
          <option value="sql">SQL</option>
          <option value="java">Java</option>
          <option value="go">Go</option>
        </select>
      </div>

      <textarea id="code" placeholder="Paste your code here..."></textarea>

      <div class="actions">
        <button class="primary" id="runBtn">Run Review</button>
        <button class="secondary" id="sampleBtn">Load Sample</button>
      </div>

      <div class="result hidden" id="result">
        <div id="status" class="muted" style="margin:14px 0 10px"></div>
        <div id="report"></div>
      </div>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const reportEl = document.getElementById('report');
    const runBtn = document.getElementById('runBtn');

    const sample = `function sum(items) {
  var total = 0;
  for (var i = 0; i <= items.length; i++) {
    total += items[i];
  }
  return total;
}`;

    document.getElementById('sampleBtn').addEventListener('click', () => {
      codeEl.value = sample;
    });

    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function renderReport(data) {
      const healthClass = data.health >= 85 ? 'good' : data.health >= 65 ? 'fair' : 'bad';
      const healthLabel = data.health >= 85 ? 'Good' : data.health >= 65 ? 'Fair' : 'Needs work';

      const issuesHtml = (data.issues || []).length
        ? `<div class="issues">${
            data.issues.map(issue => `
              <div class="issue">
                <h3>${esc(issue.title || 'Issue')}</h3>
                <p>${esc(issue.description || '')}</p>
                ${issue.fix ? `<pre>${esc(issue.fix)}</pre>` : ''}
              </div>
            `).join('')
          }</div>`
        : `<p class="muted">No issues found.</p>`;

      reportEl.innerHTML = `
        <div style="margin-bottom:12px">
          <span class="badge ${healthClass}">Health ${esc(data.health)}</span>
          <span class="badge ${healthClass}">${healthLabel}</span>
        </div>
        <div class="summary">${esc(data.summary || 'Analysis complete.')}</div>
        ${issuesHtml}
      `;
    }

    async function analyze() {
      const code = codeEl.value.trim();
      const language = document.getElementById('language').value;
      const reviewName = document.getElementById('reviewName').value.trim();

      if (!code) {
        alert('Paste some code first.');
        return;
      }

      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      resultEl.classList.remove('hidden');
      statusEl.textContent = 'Analyzing code...';
      reportEl.innerHTML = '';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, language, reviewName })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');

        statusEl.textContent = 'Analysis complete.';
        renderReport(data);
      } catch (err) {
        statusEl.textContent = 'Analysis failed.';
        reportEl.innerHTML = `<div class="issue" style="border-left-color:#ef4444"><h3>Error</h3><p>${esc(err.message)}</p></div>`;
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run Review';
      }
    }

    runBtn.addEventListener('click', analyze);
  </script>
</body>
</html>
