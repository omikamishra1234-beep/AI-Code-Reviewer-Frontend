<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCritic</title>
  <style>
    :root{
      --bg:#0d1117; --panel:#161d28; --panel2:#1d2635; --border:#2b3647;
      --text:#e6edf3; --muted:#94a3b8; --accent:#4ea1ff; --ok:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:1000px;margin:0 auto;padding:32px 20px}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0 0 20px;color:var(--muted);line-height:1.5}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
    .row{display:grid;grid-template-columns:1fr 220px;gap:14px;margin-bottom:14px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{
      width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:10px;padding:12px 14px;outline:none
    }
    textarea{min-height:280px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--accent)}
    .actions{display:flex;gap:10px;margin-top:12px}
    button{
      border:0;border-radius:10px;padding:12px 16px;cursor:pointer;font-weight:700
    }
    .primary{background:var(--accent);color:#04111f}
    .secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
    .result{margin-top:18px}
    .hidden{display:none}
    .summary{font-size:15px;line-height:1.6;color:var(--text)}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-right:8px}
    .good{background:rgba(34,197,94,.15);color:#86efac}
    .fair{background:rgba(245,158,11,.15);color:#fcd34d}
    .bad{background:rgba(239,68,68,.15);color:#fca5a5}
    .issues{display:grid;gap:10px;margin-top:14px}
    .issue{background:var(--panel2);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:10px;padding:12px}
    .issue h3{margin:0 0 6px;font-size:16px}
    .issue p{margin:0;color:var(--text)}
    .issue.keep{border-left-color:var(--ok)}
    .issue.remove{border-left-color:#ef4444}
    .collapsible{cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;user-select:none}
    .collapsible::-webkit-details-marker{display:none}
    .collapsible h3{margin:0;display:inline-block;color:var(--accent)}
    .collapsible::after{content:'▼';font-size:12px;color:var(--muted);transition:transform 0.2s;margin-left:auto}
    details[open] .collapsible::after{transform:rotate(180deg)}
    details{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px}
    details:last-child{border-bottom:0}
    h3{margin:24px 0 10px;font-size:18px;color:var(--accent)}
    /* Gauge Styles */
    .gauge-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
      position: relative;
    }
    .gauge {
      width: 140px;
      height: 140px;
      transform: rotate(-90deg);
    }
    .gauge-bg {
      fill: none;
      stroke: var(--panel2);
      stroke-width: 10;
    }
    .gauge-progress {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.8s ease;
    }
    .gauge-text {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .gauge-score {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .gauge-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .gauge-subtext {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 4px;
    }
    .gauge-date {
      font-size: 9px;
      color: var(--muted);
      opacity: 0.7;
      margin-top: 2px;
    }
    ul.muted{padding-left:20px;margin:0 0 20px}
    ul.muted li{margin-bottom:6px}
    .muted{color:var(--muted)}
    pre{white-space:pre-wrap;background:#0b1220;border:1px solid var(--border);padding:12px;border-radius:10px;overflow:auto}
    /* Loading Animation */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      gap: 20px;
    }
    .loading-icon {
      font-size: 80px;
      animation: pulse 1.5s infinite ease-in-out;
      filter: drop-shadow(0 0 15px var(--accent));
      user-select: none;
    }
    .loading-text {
      font-weight: 400;
      font-size: 18px;
      letter-spacing: 1px;
      color: var(--accent);
    }
    @media (max-width: 720px){ .row{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="app">
    <h1>🤖 CodeCritic</h1>
    <p>Paste your code, run a review, and see the analysis.</p>

    <div class="card">
      <div class="row" style="grid-template-columns: 1fr;">
        <select id="language">
          <option value="python" selected>Python</option>
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="sql">SQL</option>
          <option value="java">Java</option>
          <option value="go">Go</option>
        </select>
      </div>

      <textarea id="code" placeholder="Paste your code here..."></textarea>

      <div class="actions">
        <button class="primary" id="runBtn">Run Review</button>
        <button class="secondary" id="sampleBtn">Load Sample</button>
      </div>

      <div class="result hidden" id="result">
        <div id="status" class="muted" style="margin:14px 0 10px"></div>
        <div id="report"></div>
      </div>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const resultEl = document.getElementById('result');
    const statusEl = document.getElementById('status');
    const reportEl = document.getElementById('report');
    const runBtn = document.getElementById('runBtn');

    const sample = `import os
import hashlib

# 1. Security Risk: Hardcoded sensitive data
API_KEY = "sk-1234567890abcdef1234567890abcdef"

def process_user_data(user_id, password):
    # 2. Security Risk: Using an insecure hashing algorithm (MD5)
    # 3. Logic: No salt used for password hashing
    hashed_pw = hashlib.md5(password.encode()).hexdigest()
    
    # 4. Performance: Inefficient list lookup in a loop (O(n^2))
    # 5. Clean Code: Generic variable names (temp_list)
    temp_list = []
    for i in range(1000):
        if i not in temp_list:
            temp_list.append(i)
            
    # 6. Security Risk: SQL Injection vulnerability
    # 7. Practice: Using string formatting for queries instead of parameterized inputs
    query = "SELECT * FROM users WHERE id = '" + user_id + "' AND pw = '" + hashed_pw + "'"
    print(f"Executing: {query}")
    
    # 8. Error Handling: Bare 'except' block (swallowing errors)
    try:
        # 9. Security: Shell injection risk via unvalidated user_id
        os.system("rm -rf /tmp/logs/" + user_id)
    except:
        pass

# 10. Design: Global scope execution without if __name__ == '__main__':
process_user_data("admin'; DROP TABLE users; --", "password123")`;

    document.getElementById('sampleBtn').addEventListener('click', () => {
      codeEl.value = sample;
    });

    function esc(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function renderReport(data) {
      const score = data.score ?? 0;
      const scoreHex = score >= 80 ? '#22c55e' : score >= 50 ? '#f59e0b' : '#ef4444';
      const radius = 60;
      const circumference = 2 * Math.PI * radius;
      const offset = circumference - (score / 100) * circumference;
      const now = new Date();
      const dateStr = `as on ${now.toLocaleDateString()} ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true })}`;

      const parseItem = (item) => {
        if (!item) return { title: 'Unknown Item' };
        if (typeof item === 'object') return item;
        if (typeof item === 'string' && item.includes(' & ')) {
          const [title, ...rest] = item.split(' & ');
          return { title, description: rest.join(' & ') };
        }
        return { title: String(item) };
      };

      const renderSection = (title, items, icon, colorClass = '', defaultOpen = true) => {
        if (!items || items.length === 0) return '';
        return `
          <details ${defaultOpen ? 'open' : ''}>
            <summary class="collapsible">
              <h3>${icon} ${title}</h3>
            </summary>
            <div class="issues" style="margin-top:12px">
              ${items.map(item => {
                const { title: itemTitle, description, fix } = parseItem(item);
                return `
                  <div class="issue ${colorClass}">
                    <h3 style="color:inherit; font-size:16px">${esc(itemTitle)}</h3>
                    <p>${esc(description || '')}</p>
                    ${fix ? `<pre style="margin-top:10px">${esc(fix)}</pre>` : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </details>
        `;
      };

      const hasAny = (data.improve?.length || 0) > 0 || (data.remove?.length || 0) > 0 || (data.keep?.length || 0) > 0;

      statusEl.textContent = '';

      reportEl.innerHTML = `
        <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:24px; border-bottom:1px solid var(--border); padding-bottom:24px">
          <div class="gauge-container">
            <svg class="gauge" viewBox="0 0 140 140">
              <circle class="gauge-bg" cx="70" cy="70" r="${radius}"></circle>
              <circle class="gauge-progress" cx="70" cy="70" r="${radius}" 
                style="stroke-dasharray: ${circumference}; stroke-dashoffset: ${offset}; stroke: ${scoreHex};">
              </circle>
            </svg>
            <div class="gauge-text">
              <span class="gauge-label">Score</span>
              <span class="gauge-score">${esc(score)}</span>
            </div>
          </div>
        </div>
        ${!hasAny ? '<div class="summary">No issues found.</div>' : ''}
        <div style="margin-top:10px">
          ${renderSection('Improvements', data.improve, '🚀')}
          ${renderSection('Keep', data.keep, '✅', 'keep')}
          ${renderSection('Remove', data.remove, '❌', 'remove')}
        </div>
      `;
    }

    async function analyze() {
      const code = codeEl.value.trim();
      const language = document.getElementById('language').value;

      if (!code) {
        alert('Paste some code first.');
        return;
      }

      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      resultEl.classList.remove('hidden');
      
      // animated loading state
      statusEl.textContent = '';
      reportEl.innerHTML = `
        <div class="loading-container">
          <div class="loading-icon">🤖</div>
          <div class="loading-text">Critiquing your code...</div>
        </div>
      `;

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, language })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');

        renderReport(data);
      } catch (err) {
        statusEl.textContent = 'Analysis failed.';
        reportEl.innerHTML = `<div class="issue" style="border-left-color:#ef4444"><h3>Error</h3><p>${esc(err.message)}</p></div>`;
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run Review';
      }
    }

    runBtn.addEventListener('click', analyze);
  </script>
</body>
</html>
